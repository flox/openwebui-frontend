{
  "lockfile-version": 1,
  "manifest": {
    "version": 1,
    "install": {
      "gcc-unwrapped": {
        "pkg-path": "gcc-unwrapped",
        "systems": [
          "x86_64-linux"
        ]
      },
      "gum": {
        "pkg-path": "gum"
      },
      "open-webui-frontend": {
        "store-path": "/nix/store/kqlh5cqxxyq9k9rgl4h20m2awgwyrn90-open-webui-frontend-0.8.5",
        "systems": [
          "x86_64-linux"
        ]
      },
      "python311": {
        "pkg-path": "python311Full"
      },
      "uv": {
        "pkg-path": "uv"
      }
    },
    "hook": {
      "on-activate": "  export BACKEND_HOST=\"${BACKEND_HOST:-127.0.0.1}\"\n  export BACKEND_PORT=\"${BACKEND_PORT:-8000}\"\n  export BACKEND_HEALTH=\"${BACKEND_HEALTH:-/health}\"\n\n  if [ -z \"${DEFAULT_MODEL_PARAMS:-}\" ]; then\n    export DEFAULT_MODEL_PARAMS='{\"stream_response\": false, \"max_tokens\": 3072}'\n  fi\n  export CORS_ALLOW_ORIGIN=\"${CORS_ALLOW_ORIGIN:-*}\"\n\n  _owui_bin=\"$(which open-webui-frontend)\"\n  _owui_root=\"$(dirname \"$(dirname \"$(readlink -f \"$_owui_bin\")\")\")\"\n  source \"$_owui_root/share/open-webui/setup.sh\"\n  unset _owui_bin _owui_root\n"
    },
    "profile": {
      "common": "  echo \"Open WebUI frontend\"\n  echo \"  backend: http://${BACKEND_HOST}:${BACKEND_PORT}/v1\"\n  echo \"  webui:   http://localhost:${PORT}\"\n  echo \"\"\n  echo \"  flox activate -s  to start\"\n"
    },
    "options": {
      "systems": [
        "x86_64-linux"
      ],
      "cuda-detection": false
    },
    "services": {
      "open-webui": {
        "command": "until curl -sf \"http://${BACKEND_HOST}:${BACKEND_PORT}${BACKEND_HEALTH}\" >/dev/null 2>&1; do echo \"Waiting for backend on ${BACKEND_HOST}:${BACKEND_PORT}...\"; sleep 3; done; echo \"Backend ready — starting Open WebUI on port ${PORT}\"; exec open-webui-frontend",
        "is-daemon": false
      }
    }
  },
